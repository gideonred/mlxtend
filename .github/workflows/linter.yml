name: Lint using isort, black, and flake8

on: [pull_request]

jobs:
  formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Run isort and black
        run: |
          uv run --group dev python -m isort -p mlxtend --check --diff --line-length 88 --multi-line 3 --py 39 --profile black mlxtend/*
          uv run --group dev python -m black --check --diff mlxtend/*
          # exit-zero treats all errors as warnings.
          uv run --group dev python -m flake8 . --config=.flake8 --count --exit-zero --statistics
